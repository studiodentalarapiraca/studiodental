backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

locale: "pt"

collections:
  - name: "tratamentos"
    label: "Tratamentos"
    label_singular: "Tratamento"
    folder: "src/content/tratamentos"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Título", name: "titulo", widget: "string" }
      - { label: "Rótulo (categoria curta, ex: FACETAS)", name: "rotulo", widget: "string" }
      - { label: "Ordem de exibição", name: "ordem", widget: "number", default: 0 }
      - { label: "Descrição", name: "body", widget: "text" }

  - name: "portfolio"
    label: "Portfólio"
    label_singular: "Caso"
    folder: "src/content/portfolio"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Título / referência interna", name: "titulo", widget: "string" }
      - { label: "Foto", name: "imagem", widget: "image" }
      - { label: "Ordem de exibição", name: "ordem", widget: "number", default: 0 }
